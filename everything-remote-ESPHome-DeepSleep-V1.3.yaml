          - ON for 50ms to 350ms
          - OFF for at least 350ms
        then:
          - script.execute: reset_idle_timer
          - homeassistant.event:
              event: esphome.remote_button_pressed
              data:
                button: "brightness_down"
                type: "single"
                device: "${device_name}"
      - timing:
          - ON for 50ms to 350ms
          - OFF for 50ms to 350ms
          - ON for 50ms to 350ms
          - OFF for at least 200ms
        then:
          - script.execute: reset_idle_timer
          - homeassistant.event:
              event: esphome.remote_button_pressed
              data:
                button: "brightness_down"
                type: "double"
                device: "${device_name}"
      - timing:
          - ON for at least 500ms
        then:
          - script.execute: reset_idle_timer
          - homeassistant.event:
              event: esphome.remote_button_pressed
              data:
                button: "brightness_down"
                type: "long"
                device: "${device_name}"

  # ── BRIGHTNESS UP (GPIO27) ─────────────────────────────────
  - platform: gpio
    pin:
