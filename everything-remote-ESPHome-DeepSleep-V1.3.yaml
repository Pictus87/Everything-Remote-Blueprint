substitutions:
  device_name: everything-remote #put here the individual name of your device, that you need to write also in the blueprint!

esphome:
  name: everything-remote 
  friendly_name: Everything-Remote
  on_boot:
    - priority: 250
      then:
        - lambda: |-
            id(last_active) = millis() / 1000;

            auto cause = esp_sleep_get_wakeup_cause();
            if (cause == ESP_SLEEP_WAKEUP_EXT0) {
              ESP_LOGI("main", "Device woke up by EXT0 (Power Button)");
            } else {
              ESP_LOGD("main", "Device woke up, cause: %d", cause);
            }

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:

api:

ota:
  platform: esphome

wifi:
  ssid: "Wifi SSID"
  password: "Wifi PW"
  fast_connect: true
  power_save_mode: LIGHT
globals:
  - id: last_active
    type: int
    restore_value: no
    initial_value: '0'

script:
  - id: reset_idle_timer
    then:
      - lambda: |-
          id(last_active) = millis() / 1000;

deep_sleep:
  id: deep_sleep_ctrl
  sleep_duration: 2800min
  wakeup_pin:
    number: GPIO0
    inverted: true
    allow_other_uses: true

interval:
  - interval: 30s
    then:
      - if:
          condition:
            lambda: return (millis() / 1000) - id(last_active) >= 600;
          then:
            - deep_sleep.enter: deep_sleep_ctrl

# ==============================================================
# MAKRO: Jeder physische Button löst 3 Template-Sensoren aus:
#   <id>_single, <id>_double, <id>_long
# ==============================================================

binary_sensor:

  # ── POWER (GPIO0 – nur Wake-up) ───────────────────────────
  - platform: gpio
    pin:
      number: GPIO0
      mode: { input: true, pullup: true }
      inverted: true
      allow_other_uses: true
    name: "Power"
    id: power
    internal: true

  # ── BACK (GPIO2) ───────────────────────────────────────────
  - platform: gpio
    pin:
      number: GPIO2
      mode: { input: true, pullup: true }
      inverted: true
    name: "Back"
    id: back
    internal: true
    on_multi_click:
      - timing:
          - ON for 50ms to 350ms
          - OFF for at least 350ms
        then:
          - script.execute: reset_idle_timer
          - homeassistant.event:
              event: esphome.remote_button_pressed
              data:
                button: "back"
                type: "single"
                device: "${device_name}"
      - timing:
          - ON for 50ms to 350ms
          - OFF for 50ms to 350ms
          - ON for 50ms to 350ms
          - OFF for at least 200ms
        then:
