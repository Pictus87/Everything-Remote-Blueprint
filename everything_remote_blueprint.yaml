blueprint:
  name: Everything Remote V1.3
  description:  
    Automation for the Everything Remote (ESP32 ESPHome).
    
    - Supports single, double and long press for all 20 buttons.
    - All buttons are in the order from top left to bottom (see readme picture)
    - Each button section is collapsible and has an optional name field for naming the main function
    - The power button wakes the device from deep sleep (no HA event).

  domain: automation
  input:
    device_name:
      name: "Device name"
      description: >
        ESPHome device name (e.g. "everything_remote").
        Must match the 'name' field in the ESPHome config.
      default: "everything_remote"
      selector:
        text: {}

    section_back:
      name: "⬅️ Back"
      icon: mdi:gesture-tap-button
      description: ""
      collapsed: true
      input:
        back_name:
          name: "Button name (GPIO2)"
          description: "Display name for this button · GPIO2"
          default: "Back"
          selector:
            text: {}
        back_single_action:
          name: "Single click"
          default: []
          selector:
            action: {}
        back_double_action:
          name: "Double click"
          default: []
          selector:
            action: {}
        back_long_action:
          name: "Long press"
          default: []
          selector:
            action: {}

    section_home:
      name: "🏠 Home"
