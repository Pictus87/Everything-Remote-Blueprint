blueprint:
  name: Everything Remote
  description: >
    Automatisierung für das Everything Remote (ESP32 ESPHome).


    Unterstützt Single, Double und Long Press für alle 20 Buttons.
    Wähle zuerst den Gerätenamen aus (falls du mehrere Remotes hast),
    dann trage einfach die gewünschten Aktionen ein.
    Nicht belegte Buttons werden ignoriert.


    ℹ️ Das Gerät geht nach 10 Minuten Inaktivität in den Deep Sleep.
    Der Power Button weckt es wieder auf (kein HA-Event).

  domain: automation
  input:

    # ── GERÄT ────────────────────────────────────────────────
    device_name:
      name: "Gerätename"
      description: >
        ESPHome Gerätename (z.B. "everything_remote").
        Muss mit dem 'name' in der ESPHome Config übereinstimmen.
        Bei mehreren Remotes hier den jeweiligen Namen eintragen.
      default: "everything_remote"
      selector:
        text: {}

    # ── BACK ─────────────────────────────────────────────────
    back_single_action:
      name: "⬅️ Back – Single Click"
      default: []
      selector:
        action: {}
    back_double_action:
      name: "⬅️ Back – Double Click"
      default: []
      selector:
        action: {}
    back_long_action:
      name: "⬅️ Back – Long Press"
      default: []
      selector:
        action: {}

    # ── HOME ─────────────────────────────────────────────────
    home_single_action:
      name: "🏠 Home – Single Click"
      default: []
      selector:
        action: {}
    home_double_action:
      name: "🏠 Home – Double Click"
      default: []
      selector:
        action: {}
    home_long_action:
      name: "🏠 Home – Long Press"
      default: []
      selector:
        action: {}

    # ── PLAY PAUSE ───────────────────────────────────────────
    play_pause_single_action:
      name: "⏯️ Play Pause – Single Click"
      default: []
      selector:
        action: {}
    play_pause_double_action:
      name: "⏯️ Play Pause – Double Click"
      default: []
