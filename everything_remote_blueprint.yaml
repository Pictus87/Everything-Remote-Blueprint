# ==============================================================
# VARIABLEN
# ==============================================================
variables:
  device_name: !input device_name

# ==============================================================
# EIN EINZIGER TRIGGER – Gerät wird per Condition gefiltert
# ==============================================================
triggers:
  - trigger: event
    event_type: esphome.remote_button_pressed

conditions:
  - condition: template
    value_template: "{{ trigger.event.data.device == device_name }}"

# ==============================================================
# ACTIONS
# ==============================================================
actions:
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ trigger.event.data.button == 'back' and trigger.event.data.type == 'single' }}"
        sequence: !input back_single_action
      - conditions:
          - condition: template
            value_template: "{{ trigger.event.data.button == 'back' and trigger.event.data.type == 'double' }}"
        sequence: !input back_double_action
      - conditions:
          - condition: template
            value_template: "{{ trigger.event.data.button == 'back' and trigger.event.data.type == 'long' }}"
        sequence: !input back_long_action

      - conditions:
