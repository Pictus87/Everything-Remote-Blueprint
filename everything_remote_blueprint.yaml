variables:
  device_name: !input device_name

triggers:
  - trigger: event
    event_type: esphome.remote_button_pressed

conditions:
  - condition: template
    value_template: "{{ trigger.event.data.device == device_name }}"

actions:
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ trigger.event.data.button == 'back' and trigger.event.data.type == 'single' }}"
        sequence: !input back_single_action
      - conditions:
          - condition: template
            value_template: "{{ trigger.event.data.button == 'back' and trigger.event.data.type == 'double' }}"
