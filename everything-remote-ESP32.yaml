# ==============================================================
# BATTERIE
# ==============================================================
sensor:
  - platform: adc
    pin: GPIO36        # VP – externer Spannungsteiler 2× 100kΩ
    name: "Battery Voltage"
    id: battery_voltage
    attenuation: 11db
    update_interval: 60s
    filters:
      - multiply: 1.941  # kalibriert: gemessen 3.3V, angezeigt 3.4V
      - median:
          window_size: 5
          send_every: 5
          send_first_at: 1

  - platform: template
    name: "Battery Percent"
    id: battery_percent
    unit_of_measurement: "%"
    device_class: battery
    state_class: measurement
    update_interval: 60s
    lambda: |-
      float v = id(battery_voltage).state;
      // LiPo 1200mAh: 4.2V = 100%, 3.0V = 0%
      float pct = (v - 3.0) / (4.2 - 3.0) * 100.0;
      if (pct > 100.0) pct = 100.0;
      if (pct < 0.0)   pct = 0.0;
      return pct;