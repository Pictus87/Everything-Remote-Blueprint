    pin:
      number: GPIO2
      mode: { input: true, pullup: true }
      inverted: true
    name: "Back"
    id: back
    internal: true
    on_multi_click:
      - timing:
          - ON for 50ms to 350ms
          - OFF for at least 350ms
        then:
          - script.execute: reset_idle_timer
          - binary_sensor.template.publish:
              id: back_single
