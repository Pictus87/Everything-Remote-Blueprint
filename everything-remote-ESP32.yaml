esphome:
  name: everything-remote
  friendly_name: Everything Remote
  on_boot:
    - priority: 250
      then:
        - lambda: |-
            id(last_active) = millis() / 1000;
            id(wake_button_processed) = false;

            auto cause = esp_sleep_get_wakeup_cause();
            if (cause == ESP_SLEEP_WAKEUP_EXT0) {
              ESP_LOGI("main", "Device woke up by EXT0");
            } else if (cause == ESP_SLEEP_WAKEUP_TIMER) {
              ESP_LOGD("main", "Device woke up by timer.");
            } else {
              ESP_LOGD("main", "Device woke up by other cause: %d", cause);
            }

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:

api:

ota:
  platform: esphome

wifi:
  ssid: "Wifi SSID"
  password: "Wifi PW"
  fast_connect: true
  power_save_mode: LIGHT

globals:
  - id: last_active
    type: int
    restore_value: no
    initial_value: '0'
  - id: wake_button_processed
    type: bool
    restore_value: no
    initial_value: 'false'

script:
  - id: reset_idle_timer
    then:
      - lambda: |-
          id(last_active) = millis() / 1000;

deep_sleep:
  id: deep_sleep_ctrl
  sleep_duration: 2800 min
  wakeup_pin:
    number: GPIO0
    inverted: true
    allow_other_uses: true

interval:
  - interval: 60s
    then:
      - if:
          condition:
            lambda: return (millis() / 1000) - id(last_active) >= 1200;
          then:
            - deep_sleep.enter: deep_sleep_ctrl

# ==============================================================
# MAKRO: Jeder physische Button löst 3 Template-Sensoren aus:
#   <id>_single, <id>_double, <id>_long
# ==============================================================

binary_sensor:

  # ── POWER (GPIO0 – kein double click wegen wake-up) ────────
  - platform: gpio
    pin:
      number: GPIO0
      mode: { input: true, pullup: true }
      inverted: true
      allow_other_uses: true
    name: "Power"
    id: power
    internal: true
    on_press:
      then:
        - script.execute: reset_idle_timer
        - binary_sensor.template.publish:
            id: power_single
            state: ON
        - delay: 200ms
        - binary_sensor.template.publish:
            id: power_single
            state: OFF

  - platform: template
    name: "Power Single"
    id: power_single

  # ── BACK (GPIO2) ───────────────────────────────────────────
